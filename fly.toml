# Run: fly launch (first time) then fly secrets set ANTHROPIC_API_KEY=...
app = "phishguard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NMAP_PATH = "/usr/bin/nmap"
  GUNICORN_TIMEOUT = "900"
  PHISHTANK_APP_NAME = "PhishGuard"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[http_service.http_options]
  idle_timeout = 900
  response_timeout = 900

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
